            <h1>02. Molstar 简介</h1>
            
            <div class="content">
                <h2>简介</h2>
                    <p>Molstar 是一个基于 Web 的分子可视化工具，它允许用户在浏览器中查看和分析蛋白质、核酸等生物大分子的三维结构。它相比 pyMol 具有更轻量、更易用的优势，我们可以利用它在高效且较低的学习成本下做出各种漂亮的图片。</p>
                    <p>Molstar 并不复杂，你可以单击这个连接直接进入到 <a href="https://molstar.org/" target="_blank" style="color: #3498db;">Molstar</a> 的官方界面，另外博客也直接把它们的在线组件接入进来。你可以在资源站去找蛋白质结构查看器。</p>
