            <h1>07. BigWig</h1>
            
            <div class="content">
                <h2>简介</h2>
                <p>BigWig 是一种用于存储和显示基因组数据的文件格式，特别适用于表示连续的定量数据，如 ChIP-Seq、RNA-Seq 等测序数据的覆盖度。</p>
                <p>相较于在 IGV 或其他基因组浏览器中显示 BAM 文件，BigWig 格式更加轻量级，加载速度更快，适合在网页上进行可视化展示。</p>
